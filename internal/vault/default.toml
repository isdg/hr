# hrb vault config. Add or remove feeds below, then `hrb sync`.

[[feeds]]
url  = "https://go.dev/blog/feed.atom"
name = "go-blog"
tags = ["go"]

# Sort order for `hrb list` / `hrb feed`. "desc" = newest first.
ordering = "desc"

# Mark items read when their file is opened (requires nvim autocmd).
autoread = false

# User-Agent for HTTP requests.
user_agent = "hrb/0.1"
